<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Finder Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --surface: #1c1c1e;
            --primary: #fa243c; /* Apple Music Red/Pink */
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --border: #38383a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 120px; /* Space for the bottom player */
            overflow-x: hidden;
        }

        /* Pull-to-refresh warning area */
        #refreshWarning {
            text-align: center;
            padding: 10px;
            color: var(--text-muted);
            font-size: 12px;
            background: var(--surface);
            display: none;
        }

        /* Header & Search */
        .header {
            padding: 20px;
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        h1 { margin: 0 0 15px 0; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }

        .search-bar {
            display: flex;
            gap: 10px;
            background: var(--surface);
            border-radius: 12px;
            padding: 5px;
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 15px;
            font-size: 16px; /* Prevents iOS zoom */
            outline: none;
            font-family: 'Inter', sans-serif;
        }

        input::placeholder { color: var(--text-muted); }

        .search-btn {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 20px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
        }

        .search-btn:active { opacity: 0.8; transform: scale(0.98); }

        /* Filters */
        .filters {
            display: flex;
            gap: 10px;
            padding: 0 20px;
            margin-top: 15px;
        }

        select {
            flex: 1;
            background: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            -webkit-appearance: none;
        }

        /* Content Area */
        .container { padding: 20px; }

        h2.section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        /* History Tags */
        .history-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tag {
            background: var(--surface);
            color: var(--text-muted);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .tag:active { background: var(--border); }

        /* Top 3 Results List */
        .results-list { display: flex; flex-direction: column; gap: 15px; }

        .track-card {
            display: flex;
            align-items: center;
            background: var(--surface);
            padding: 10px;
            border-radius: 12px;
            gap: 15px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .track-card:active { background: #2c2c2e; }

        .rank {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-muted);
            width: 20px;
            text-align: center;
        }

        .rank-1 { color: var(--primary); }

        .track-art {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
            background: #333;
        }

        .track-info { flex: 1; overflow: hidden; }
        .track-title { margin: 0 0 4px 0; font-size: 16px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { margin: 0; font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .download-icon {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
        }

        /* Sticky Bottom Player */
        .player {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(28, 28, 30, 0.9);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--border);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .player.active { transform: translateY(0); }

        .player-art { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; }
        .player-info { flex: 1; overflow: hidden; }
        .player-title { margin: 0 0 3px 0; font-size: 15px; font-weight: 600; }
        .player-artist { margin: 0; font-size: 12px; color: var(--text-muted); }

        .player-controls { display: flex; align-items: center; gap: 15px; }
        
        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .play-btn {
            width: 40px;
            height: 40px;
            background: white;
            color: black;
            border-radius: 50%;
            font-size: 18px;
        }

        .spinner {
            display: none;
            margin: 40px auto;
            border: 3px solid var(--border);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="refreshWarning">Pull down to refresh page</div>

<div class="header">
    <h1>Search</h1>
    <div class="search-bar">
        <input type="text" id="songInput" placeholder="Artists, Songs, or Moods" autocomplete="off">
        <button class="search-btn" onclick="triggerSearch()">Go</button>
    </div>
</div>

<div class="filters">
    <select id="regionSelect">
        <option value="all">🌍 Global Hits</option>
        <option value="indian">🇮🇳 Bollywood</option>
    </select>
    <select id="qualitySelect">
        <option value="320">HQ Audio</option>
        <option value="128">Standard</option>
    </select>
</div>

<div class="container">
    <h2 class="section-title">Recent Searches</h2>
    <div class="history-tags" id="historyBox">
        </div>

    <div class="spinner" id="spinner"></div>

    <div id="resultsContainer" style="display: none;">
        <h2 class="section-title">Top Results</h2>
        <div class="results-list" id="resultsList">
            </div>
    </div>
</div>

<div class="player" id="bottomPlayer">
    <img src="" id="playerArt" class="player-art" alt="art">
    <div class="player-info">
        <p class="player-title" id="playerTitle">Select a track</p>
        <p class="player-artist" id="playerArtist">-</p>
    </div>
    <div class="player-controls">
        <button class="control-btn play-btn" id="playPauseBtn" onclick="togglePlay()">▶</button>
        <button class="control-btn" onclick="playNext()">⏭</button>
    </div>
    <audio id="mainAudio"></audio>
</div>

<script>
    // --- 1. Pull to Refresh Logic (Mobile UX) ---
    let touchstartY = 0;
    document.addEventListener('touchstart', e => { touchstartY = e.touches[0].clientY; }, {passive: true});
    document.addEventListener('touchend', e => {
        if (window.scrollY === 0 && e.changedTouches[0].clientY - touchstartY > 100) {
            document.getElementById('refreshWarning').style.display = 'block';
            setTimeout(() => location.reload(), 1000);
        }
    }, {passive: true});

    // --- 2. Local Storage (Cookies/History) ---
    function loadHistory() {
        const history = JSON.parse(localStorage.getItem('musicHistory')) || [];
        const box = document.getElementById('historyBox');
        if (history.length === 0) {
            box.innerHTML = `<span class="tag">Nothing yet. Start searching!</span>`;
            return;
        }
        box.innerHTML = history.map(term => `<span class="tag" onclick="searchHistory('${term}')">${term}</span>`).join('');
    }

    function saveHistory(term) {
        if(!term) return;
        let history = JSON.parse(localStorage.getItem('musicHistory')) || [];
        history = [term, ...history.filter(i => i !== term)].slice(0, 5); // Keep last 5
        localStorage.setItem('musicHistory', JSON.stringify(history));
        loadHistory();
    }

    function searchHistory(term) {
        document.getElementById('songInput').value = term;
        triggerSearch();
    }

    window.onload = loadHistory;

    // --- 3. Enter Key ---
    document.getElementById('songInput').addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            this.blur();
            triggerSearch();
        }
    });

    // --- Global State for Player ---
    let currentTracks = [];
    let currentIndex = 0;
    const audioEl = document.getElementById('mainAudio');
    const playPauseBtn = document.getElementById('playPauseBtn');

    // --- 4. Advanced Search Fetch ---
    async function triggerSearch() {
        const query = document.getElementById('songInput').value.trim();
        const region = document.getElementById('regionSelect').value;
        const quality = document.getElementById('qualitySelect').value;
        
        if (!query) return;

        saveHistory(query);
        document.getElementById('spinner').style.display = 'block';
        document.getElementById('resultsContainer').style.display = 'none';

        try {
            // NOTE: Your Python backend must be updated to return an array named 'results'
            const response = await fetch(`https://my-song-brain.onrender.com/api/search?q=${encodeURIComponent(query)}&region=${region}&quality=${quality}`);
            const data = await response.json();

            document.getElementById('spinner').style.display = 'none';

            if (data.success && data.results.length > 0) {
                currentTracks = data.results; // Save top 3 to global array
                renderTop3(currentTracks);
                document.getElementById('resultsContainer').style.display = 'block';
            } else {
                alert("No close matches found.");
            }
        } catch (error) {
            document.getElementById('spinner').style.display = 'none';
            alert("Backend asleep or error. Wake up Render!");
        }
    }

    // --- 5. Render Top 3 ---
    function renderTop3(tracks) {
        const list = document.getElementById('resultsList');
        list.innerHTML = '';

        tracks.forEach((track, index) => {
            const rankClass = index === 0 ? 'rank-1' : '';
            list.innerHTML += `
                <div class="track-card" onclick="loadTrack(${index})">
                    <span class="rank ${rankClass}">#${index + 1}</span>
                    <img src="${track.cover_art}" class="track-art" alt="art">
                    <div class="track-info">
                        <p class="track-title">${track.title}</p>
                        <p class="track-artist">${track.artist}</p>
                    </div>
                    <a href="${track.url}" class="download-icon" target="_blank" download onclick="event.stopPropagation()">GET</a>
                </div>
            `;
        });
    }

    // --- 6. Custom Apple Player Logic ---
    function loadTrack(index) {
        if(index >= currentTracks.length) index = 0; // Loop back to start
        currentIndex = index;
        const track = currentTracks[index];

        document.getElementById('bottomPlayer').classList.add('active');
        document.getElementById('playerArt').src = track.cover_art;
        document.getElementById('playerTitle').textContent = track.title;
        document.getElementById('playerArtist').textContent = track.artist;
        
        audioEl.src = track.url;
        audioEl.play();
        playPauseBtn.textContent = '⏸';
    }

    function togglePlay() {
        if (!audioEl.src) return;
        if (audioEl.paused) {
            audioEl.play();
            playPauseBtn.textContent = '⏸';
        } else {
            audioEl.pause();
            playPauseBtn.textContent = '▶';
        }
    }

    function playNext() {
        if(currentTracks.length === 0) return;
        loadTrack(currentIndex + 1);
    }

    // When audio finishes naturally, play the next one
    audioEl.onended = playNext;
</script>

</body>
</html>
