<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Song Finder</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3011/3011122.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #b026ff;
            --bg-dark: #0a0a0a;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .background-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 200vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: -2;
            opacity: 0.4;
            transform: rotate(-10deg) scale(1.5);
        }

        .album-row {
            display: flex;
            gap: 20px;
            animation: scroll 40s linear infinite;
        }

        .album-row.reverse {
            animation: scroll-reverse 50s linear infinite;
        }

        .album-cover {
            width: 250px;
            height: 250px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, rgba(10,10,10,0.3) 0%, rgba(10,10,10,0.9) 100%);
            z-index: -1;
        }

        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        @keyframes scroll-reverse { 0% { transform: translateX(-50%); } 100% { transform: translateX(0); } }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            width: 400px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            z-index: 10;
            position: relative;
        }

        h2 {
            margin-top: 0;
            font-weight: 600;
            font-size: 28px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .search-wrapper {
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
            background: rgba(0, 0, 0, 0.5);
        }

        /* 4. Live Search Suggestions Dropdown */
        .suggestions-box {
            position: absolute;
            top: 55px;
            left: 0;
            width: 100%;
            background: rgba(20, 20, 20, 0.95);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            z-index: 20;
            max-height: 150px;
            overflow-y: auto;
        }

        .suggestion-item {
            padding: 10px 15px;
            text-align: left;
            font-size: 14px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #ccc;
        }

        .suggestion-item:hover {
            background: rgba(0, 255, 204, 0.1);
            color: var(--primary);
        }

        /* 2. Filter Controls (Region & Quality) */
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        select {
            flex: 1;
            padding: 10px;
            background: rgba(0, 0, 0, 0.4);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            cursor: pointer;
        }

        select:focus {
            border-color: var(--secondary);
        }

        button {
            background: linear-gradient(135deg, var(--primary), #0099ff);
            border: none;
            padding: 15px 20px;
            border-radius: 12px;
            color: #000;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 255, 204, 0.4);
        }

        .spinner {
            display: none;
            margin: 30px auto 10px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--secondary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #result {
            margin-top: 30px;
            display: none;
        }

        #songTitle { font-size: 16px; font-weight: 400; margin-bottom: 15px; color: #e0e0e0; }

        .download-btn {
            display: inline-block;
            text-decoration: none;
            border: 2px solid var(--secondary);
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .download-btn:hover {
            background: var(--secondary);
            box-shadow: 0 0 15px rgba(176, 38, 255, 0.5);
        }
    </style>
</head>
<body>

<div class="background-wrapper">
    <div class="album-row">
        <img src="https://picsum.photos/400?random=1" class="album-cover" alt="album">
        <img src="https://picsum.photos/400?random=2" class="album-cover" alt="album">
        <img src="https://picsum.photos/400?random=3" class="album-cover" alt="album">
        <img src="https://picsum.photos/400?random=4" class="album-cover" alt="album">
    </div>
    <div class="album-row reverse">
        <img src="https://picsum.photos/400?random=5" class="album-cover" alt="album">
        <img src="https://picsum.photos/400?random=6" class="album-cover" alt="album">
        <img src="https://picsum.photos/400?random=7" class="album-cover" alt="album">
        <img src="https://picsum.photos/400?random=8" class="album-cover" alt="album">
    </div>
</div>

<div class="overlay"></div>

<div class="glass-card">
    <h2>Neon Search</h2>
    
    <div class="search-wrapper">
        <input type="text" id="songInput" placeholder="Search a song..." onkeyup="handleTyping()">
        
        <div class="suggestions-box" id="suggestionsBox">
            </div>
    </div>

    <div class="filters">
        <select id="regionSelect">
            <option value="all">Global</option>
            <option value="indian">Indian (Bollywood)</option>
            <option value="foreign">Foreign (Pop/HipHop)</option>
        </select>
        
        <select id="qualitySelect">
            <option value="320">320 kbps (HQ)</option>
            <option value="128">128 kbps (Standard)</option>
        </select>
    </div>

    <button onclick="searchSong()">Search</button>
    
    <div class="spinner" id="spinner"></div>
    
    <div id="result">
        <h3 id="songTitle"></h3>
        <a href="#" id="downloadLink" class="download-btn" target="_blank">Download MP3</a>
    </div>
</div>

<script>
    const inputField = document.getElementById('songInput');
    const suggestionsBox = document.getElementById('suggestionsBox');
    let typingTimer;

    // 3. Enter Press functionality
    inputField.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            suggestionsBox.style.display = 'none'; // Hide suggestions
            searchSong();
        }
    });

    // 4. Live Search Recommendations (Visual Mockup for now)
    function handleTyping() {
        clearTimeout(typingTimer);
        const query = inputField.value.trim();
        
        if (query.length < 2) {
            suggestionsBox.style.display = 'none';
            return;
        }

        // Simulating the time it takes to fetch recommendations
        typingTimer = setTimeout(() => {
            // In a real app, you would fetch real suggestions from your backend here.
            // For now, we simulate "Best Matches" visually.
            suggestionsBox.innerHTML = `
                <div class="suggestion-item" onclick="selectSuggestion('${query} - Best Match')">🎵 ${query} - Best Match</div>
                <div class="suggestion-item" onclick="selectSuggestion('${query} (Remix)')">🎧 ${query} (Remix)</div>
                <div class="suggestion-item" onclick="selectSuggestion('${query} (Lofi Slowed)')">🌧️ ${query} (Lofi Slowed)</div>
            `;
            suggestionsBox.style.display = 'flex';
        }, 400); // Waits 400ms after you stop typing to show suggestions
    }

    function selectSuggestion(songName) {
        inputField.value = songName;
        suggestionsBox.style.display = 'none';
        searchSong(); // Automatically search when a suggestion is clicked
    }

    // Hide suggestions if user clicks outside
    document.addEventListener('click', function(e) {
        if (!document.querySelector('.search-wrapper').contains(e.target)) {
            suggestionsBox.style.display = 'none';
        }
    });

    async function searchSong() {
        const query = inputField.value;
        const region = document.getElementById('regionSelect').value;
        const quality = document.getElementById('qualitySelect').value;
        
        const spinner = document.getElementById('spinner');
        const resultDiv = document.getElementById('result');
        const titleEl = document.getElementById('songTitle');
        const linkEl = document.getElementById('downloadLink');

        if (!query) return;

        spinner.style.display = 'block';
        resultDiv.style.display = 'none';
        suggestionsBox.style.display = 'none';

        try {
            // We are now sending the query PLUS the region and quality parameters to your Render backend
            const response = await fetch(`https://my-song-brain.onrender.com/api/search?q=${encodeURIComponent(query)}&region=${region}&quality=${quality}`);
            const data = await response.json();

            spinner.style.display = 'none';

            if (data.success) {
                // UI shows exactly what region and quality was "found"
                titleEl.textContent = `${data.title} [${region.toUpperCase()} - ${quality}kbps]`;
                linkEl.href = data.url;
                resultDiv.style.display = 'block';
            } else {
                alert("Song not found!");
            }
        } catch (error) {
            spinner.style.display = 'none';
            alert("Failed to connect to the backend!");
        }
    }
</script>

</body>
</html>
