<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Song Finder</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3011/3011122.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #b026ff;
            --bg-dark: #0a0a0a;
        }

        body {
            margin: 0;
            overflow: hidden; 
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        /* Fixed Background: Seamless Infinite Scroll */
        .background-wrapper {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 150vw;
            height: 150vh;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: -2;
            opacity: 0.35;
            transform: rotate(-15deg);
        }

        .album-row {
            display: flex;
            width: max-content; /* This ensures the row stretches exactly to fit all images */
            gap: 15px;
            animation: scroll 40s linear infinite;
        }

        .album-row.reverse {
            animation: scroll-reverse 50s linear infinite;
        }

        .album-cover {
            width: 220px;
            height: 220px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, rgba(10,10,10,0.4) 0%, rgba(10,10,10,0.95) 100%);
            z-index: -1;
        }

        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        @keyframes scroll-reverse { 0% { transform: translateX(-50%); } 100% { transform: translateX(0); } }

        /* Main Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px;
            width: 420px;
            max-width: 85%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255,255,255,0.1);
            z-index: 10;
            max-height: 90vh;
            overflow-y: auto; /* Allows scrolling inside the card if content gets too tall */
        }

        /* Custom Scrollbar for the card */
        .glass-card::-webkit-scrollbar { width: 6px; }
        .glass-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        h2 {
            margin-top: 0;
            font-weight: 700;
            font-size: 30px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .search-wrapper { position: relative; }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 16px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }

        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        select {
            flex: 1;
            padding: 12px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            -webkit-appearance: none;
        }

        select:focus { border-color: var(--secondary); }

        button {
            background: linear-gradient(135deg, var(--primary), #0099ff);
            border: none;
            padding: 16px 20px;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:active { transform: scale(0.98); }

        .spinner {
            display: none;
            margin: 25px auto 10px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* The New Result UI */
        #result {
            margin-top: 25px;
            display: none;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #resultArt {
            width: 150px;
            height: 150px;
            border-radius: 10px;
            object-fit: cover;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            margin-bottom: 15px;
        }

        #songTitle { font-size: 18px; font-weight: 600; margin: 0 0 5px 0; color: #fff; }
        #artistName { font-size: 14px; font-weight: 300; margin: 0 0 15px 0; color: var(--primary); }
        
        audio {
            width: 100%;
            height: 40px;
            margin-bottom: 15px;
            border-radius: 8px;
            outline: none;
        }

        .download-btn {
            display: block;
            text-decoration: none;
            background: transparent;
            border: 2px solid var(--secondary);
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            width: calc(100% - 50px);
            margin: 0 auto;
            transition: all 0.3s;
        }

        .download-btn:hover {
            background: var(--secondary);
            box-shadow: 0 0 15px rgba(176, 38, 255, 0.5);
        }

        @media (max-width: 480px) {
            .glass-card { padding: 30px 20px; }
            .filters { flex-direction: column; }
            .album-cover { width: 160px; height: 160px; }
        }
    </style>
</head>
<body>

<div class="background-wrapper">
    <div class="album-row">
        <img src="https://images.unsplash.com/photo-1614680376573-df3480f0c6ff?w=400&h=400&fit=crop" class="album-cover" alt="music">
        <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=400&h=400&fit=crop" class="album-cover" alt="music">
        <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=400&h=400&fit=crop" class="album-cover" alt="music">
        <img src="https://images.unsplash.com/photo-1493225457124-a1a2a5ea3a0f?w=400&h=400&fit=crop" class="album-cover" alt="music">
        <img src="https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=400&h=400&fit=crop" class="album-cover" alt="music">
        <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=400&h=400&fit=crop" class="album-cover" alt="music">
        <img src="https://images.unsplash.com/photo-1614680376573-df3480f0c6ff?w=400&h=400&fit=crop" class="album-cover" alt="music">
        <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=400&h=400&fit=crop" class="album-cover" alt="music">
        <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=400&h=400&fit=crop" class="album-cover" alt="music">
        <img src="https://images.unsplash.com/photo-1493225457124-a1a2a5ea3a0f?w=400&h=400&fit=crop" class="album-cover" alt="music">
        <img src="https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=400&h=400&fit=crop" class="album-cover" alt="music">
        <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=400&h=400&fit=crop" class="album-cover" alt="music">
    </div>
    <div class="album-row reverse">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=400&fit=crop" class="album-cover" alt="music">
        <img src="https://images.unsplash.com/photo-1516280440502-37f8ce2f0099?w=400&h=400&fit=crop" class="album-cover" alt="music">
        <img src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=400&h=400&fit=crop" class="album-cover" alt="music">
        <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=400&h=400&fit=crop" class="album-cover" alt="music">
        <img src="https://images.unsplash.com/photo-1458560871784-56d23406c091?w=400&h=400&fit=crop" class="album-cover" alt="music">
        <img src="https://images.unsplash.com/photo-1518609878373-06d740f60d8b?w=400&h=400&fit=crop" class="album-cover" alt="music">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=400&fit=crop" class="album-cover" alt="music">
        <img src="https://images.unsplash.com/photo-1516280440502-37f8ce2f0099?w=400&h=400&fit=crop" class="album-cover" alt="music">
        <img src="https://images.unsplash.com/photo-1598488035139-bdbb2231ce04?w=400&h=400&fit=crop" class="album-cover" alt="music">
        <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=400&h=400&fit=crop" class="album-cover" alt="music">
        <img src="https://images.unsplash.com/photo-1458560871784-56d23406c091?w=400&h=400&fit=crop" class="album-cover" alt="music">
        <img src="https://images.unsplash.com/photo-1518609878373-06d740f60d8b?w=400&h=400&fit=crop" class="album-cover" alt="music">
    </div>
</div>

<div class="overlay"></div>

<div class="glass-card">
    <h2>Neon Search</h2>
    
    <div class="search-wrapper">
        <input type="text" id="songInput" placeholder="Search a song..." autocomplete="off">
    </div>

    <div class="filters">
        <select id="regionSelect">
            <option value="all">Global</option>
            <option value="indian">Indian</option>
            <option value="foreign">Foreign</option>
        </select>
        
        <select id="qualitySelect">
            <option value="320">320 kbps</option>
            <option value="128">128 kbps</option>
        </select>
    </div>

    <button onclick="searchSong()">Search</button>
    
    <div class="spinner" id="spinner"></div>
    
    <div id="result">
        <img id="resultArt" src="" alt="Album Art">
        <h3 id="songTitle"></h3>
        <p id="artistName"></p>
        
        <audio id="audioPlayer" controls controlsList="nodownload">
            Your browser does not support the audio element.
        </audio>

        <a href="#" id="downloadLink" class="download-btn" target="_blank" download>Download MP3</a>
    </div>
</div>

<script>
    const inputField = document.getElementById('songInput');

    inputField.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            inputField.blur(); 
            searchSong();
        }
    });

    async function searchSong() {
        const query = inputField.value;
        const region = document.getElementById('regionSelect').value;
        const quality = document.getElementById('qualitySelect').value;
        
        const spinner = document.getElementById('spinner');
        const resultDiv = document.getElementById('result');
        
        // New DOM elements to update
        const titleEl = document.getElementById('songTitle');
        const artistEl = document.getElementById('artistName');
        const artEl = document.getElementById('resultArt');
        const audioEl = document.getElementById('audioPlayer');
        const linkEl = document.getElementById('downloadLink');

        if (!query) return;

        inputField.blur();
        spinner.style.display = 'block';
        resultDiv.style.display = 'none';
        
        // Stop any currently playing audio
        audioEl.pause();

        try {
            // Reaches out to your live Render backend
            const response = await fetch(`https://my-song-brain.onrender.com/api/search?q=${encodeURIComponent(query)}&region=${region}&quality=${quality}`);
            const data = await response.json();

            spinner.style.display = 'none';

            if (data.success) {
                // Populate the new data!
                titleEl.textContent = data.title;
                artistEl.textContent = `${data.artist} • ${data.album}`;
                artEl.src = data.cover_art || 'https://via.placeholder.com/150/0a0a0a/00ffcc?text=No+Cover'; 
                
                // Load the audio player
                audioEl.src = data.url;
                
                // Set the download button
                linkEl.href = data.url;
                
                // Show the beautifully populated card
                resultDiv.style.display = 'block';
            } else {
                alert(data.message || "Song not found!");
            }
        } catch (error) {
            spinner.style.display = 'none';
            alert("Failed to connect to the backend! Is your Render server awake?");
        }
    }
</script>

</body>
</html>
