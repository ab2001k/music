<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Song Finder</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3011/3011122.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #b026ff;
            --bg-dark: #0a0a0a;
        }

        body {
            margin: 0;
            overflow: hidden; /* Prevents sideways scrolling on mobile */
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        .background-wrapper {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 250vw; /* Extra width so mobile doesn't run out of images */
            height: 150vh;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: -2;
            opacity: 0.35;
            transform: rotate(-15deg);
        }

        .album-row {
            display: flex;
            gap: 15px;
            animation: scroll 40s linear infinite;
        }

        .album-row.reverse {
            animation: scroll-reverse 50s linear infinite;
        }

        .album-cover {
            width: 200px;
            height: 200px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, rgba(10,10,10,0.2) 0%, rgba(10,10,10,0.95) 100%);
            z-index: -1;
        }

        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        @keyframes scroll-reverse { 0% { transform: translateX(-50%); } 100% { transform: translateX(0); } }

        .glass-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px;
            width: 400px;
            max-width: 85%; /* Mobile responsiveness core */
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            z-index: 10;
            position: relative;
        }

        h2 {
            margin-top: 0;
            font-weight: 600;
            font-size: 28px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }

        .search-wrapper {
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 16px; /* 16px prevents automatic zoom on mobile keyboards */
            font-family: 'Poppins', sans-serif;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
        }

        .suggestions-box {
            position: absolute;
            top: 58px;
            left: 0;
            width: 100%;
            background: rgba(15, 15, 15, 0.98);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 15px 30px rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            z-index: 20;
            max-height: 180px;
            overflow-y: auto;
        }

        .suggestion-item {
            padding: 12px 15px;
            text-align: left;
            font-size: 14px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #ddd;
        }

        .suggestion-item:hover {
            background: rgba(0, 255, 204, 0.1);
            color: var(--primary);
        }

        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        select {
            flex: 1;
            padding: 12px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            -webkit-appearance: none; /* Cleans up default mobile dropdown styling */
        }

        select:focus {
            border-color: var(--secondary);
        }

        button {
            background: linear-gradient(135deg, var(--primary), #0099ff);
            border: none;
            padding: 16px 20px;
            border-radius: 12px;
            color: #000;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:active {
            transform: scale(0.98); /* Better feedback for mobile tapping */
        }

        .spinner {
            display: none;
            margin: 25px auto 10px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #result {
            margin-top: 25px;
            display: none;
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #songTitle { font-size: 15px; font-weight: 400; margin-top: 0; margin-bottom: 15px; color: #fff; line-height: 1.4; }

        .download-btn {
            display: inline-block;
            text-decoration: none;
            background: var(--secondary);
            color: white;
            padding: 14px 25px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            width: 80%;
            box-shadow: 0 5px 15px rgba(176, 38, 255, 0.4);
        }

        /* 📱 MOBILE RESPONSIVE RULES */
        @media (max-width: 480px) {
            .glass-card {
                padding: 30px 20px;
            }
            .filters {
                flex-direction: column; /* Stacks dropdowns vertically on small screens */
            }
            h2 {
                font-size: 24px;
            }
            .album-cover {
                width: 150px; /* Smaller background covers for mobile */
                height: 150px;
            }
        }
    </style>
</head>
<body>

<div class="background-wrapper">
    <div class="album-row">
        <img src="https://images.unsplash.com/photo-1614680376573-df3480f0c6ff?w=400&h=400&fit=crop" class="album-cover" alt="music vibe">
        <img src="https://images.unsplash.com/photo-1493225457124-a1a2a5ea3a0f?w=400&h=400&fit=crop" class="album-cover" alt="music vibe">
        <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=400&h=400&fit=crop" class="album-cover" alt="music vibe">
        <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=400&h=400&fit=crop" class="album-cover" alt="music vibe">
        <img src="https://images.unsplash.com/photo-1614680376573-df3480f0c6ff?w=400&h=400&fit=crop" class="album-cover" alt="music vibe">
    </div>
    <div class="album-row reverse">
        <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=400&h=400&fit=crop" class="album-cover" alt="music vibe">
        <img src="https://images.unsplash.com/photo-1611162617474-5b21e879e113?w=400&h=400&fit=crop" class="album-cover" alt="music vibe">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=400&fit=crop" class="album-cover" alt="music vibe">
        <img src="https://images.unsplash.com/photo-1516280440502-37f8ce2f0099?w=400&h=400&fit=crop" class="album-cover" alt="music vibe">
        <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=400&h=400&fit=crop" class="album-cover" alt="music vibe">
    </div>
</div>

<div class="overlay"></div>

<div class="glass-card">
    <h2>Neon Search</h2>
    
    <div class="search-wrapper">
        <input type="text" id="songInput" placeholder="Search a song..." onkeyup="handleTyping()" autocomplete="off">
        
        <div class="suggestions-box" id="suggestionsBox">
            </div>
    </div>

    <div class="filters">
        <select id="regionSelect">
            <option value="all">Global</option>
            <option value="indian">Indian</option>
            <option value="foreign">Foreign</option>
        </select>
        
        <select id="qualitySelect">
            <option value="320">320 kbps</option>
            <option value="128">128 kbps</option>
        </select>
    </div>

    <button onclick="searchSong()">Search</button>
    
    <div class="spinner" id="spinner"></div>
    
    <div id="result">
        <h3 id="songTitle"></h3>
        <a href="#" id="downloadLink" class="download-btn" target="_blank" download>Download MP3</a>
    </div>
</div>

<script>
    const inputField = document.getElementById('songInput');
    const suggestionsBox = document.getElementById('suggestionsBox');
    let typingTimer;

    inputField.addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            // Closes mobile keyboard when enter is pressed
            inputField.blur(); 
            suggestionsBox.style.display = 'none';
            searchSong();
        }
    });

    function handleTyping() {
        clearTimeout(typingTimer);
        const query = inputField.value.trim();
        
        if (query.length < 2) {
            suggestionsBox.style.display = 'none';
            return;
        }

        typingTimer = setTimeout(() => {
            suggestionsBox.innerHTML = `
                <div class="suggestion-item" onclick="selectSuggestion('${query}')">🎵 ${query} - Original</div>
                <div class="suggestion-item" onclick="selectSuggestion('${query} Remix')">🎧 ${query} Remix</div>
                <div class="suggestion-item" onclick="selectSuggestion('${query} Slowed')">🌧️ ${query} Slowed Reverb</div>
            `;
            suggestionsBox.style.display = 'flex';
        }, 300);
    }

    function selectSuggestion(songName) {
        inputField.value = songName;
        suggestionsBox.style.display = 'none';
        searchSong();
    }

    document.addEventListener('click', function(e) {
        if (!document.querySelector('.search-wrapper').contains(e.target)) {
            suggestionsBox.style.display = 'none';
        }
    });

    async function searchSong() {
        const query = inputField.value;
        const region = document.getElementById('regionSelect').value;
        const quality = document.getElementById('qualitySelect').value;
        
        const spinner = document.getElementById('spinner');
        const resultDiv = document.getElementById('result');
        const titleEl = document.getElementById('songTitle');
        const linkEl = document.getElementById('downloadLink');

        if (!query) return;

        inputField.blur(); // Hides Android keyboard automatically when searching
        spinner.style.display = 'block';
        resultDiv.style.display = 'none';
        suggestionsBox.style.display = 'none';

        try {
            const response = await fetch(`https://my-song-brain.onrender.com/api/search?q=${encodeURIComponent(query)}&region=${region}&quality=${quality}`);
            const data = await response.json();

            spinner.style.display = 'none';

            if (data.success) {
                titleEl.textContent = `${data.title} [${region.toUpperCase()} - ${quality}kbps]`;
                linkEl.href = data.url;
                resultDiv.style.display = 'block';
            } else {
                alert("Song not found!");
            }
        } catch (error) {
            spinner.style.display = 'none';
            alert("Failed to connect to the backend!");
        }
    }
</script>

</body>
</html>
