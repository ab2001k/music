<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Finder Pro by Abhik</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --surface: #141414;
            --surface-light: #222222;
            --primary: #00e5ff; /* Changed from red to a cool cyan neon vibe */
            --primary-glow: rgba(0, 229, 255, 0.4);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --border: #2a2a2a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 140px; 
            overflow-x: hidden;
        }

        /* Developer Credit Header */
        .dev-credit {
            text-align: center;
            padding: 8px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-muted);
            background: linear-gradient(90deg, transparent, rgba(0, 229, 255, 0.1), transparent);
            font-weight: 600;
        }
        .dev-credit span { color: var(--primary); font-family: 'Space Grotesk', sans-serif;}

        .header {
            padding: 20px;
            position: sticky;
            top: 0;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        h1 { margin: 0 0 15px 0; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; font-family: 'Space Grotesk', sans-serif;}

        .search-bar {
            display: flex;
            gap: 10px;
            background: var(--surface);
            border-radius: 12px;
            padding: 5px;
            border: 1px solid var(--border);
            transition: border-color 0.3s;
        }
        .search-bar:focus-within { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 15px;
            font-size: 16px; 
            outline: none;
        }

        .search-btn {
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 0 20px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
        }

        .container { padding: 20px; }

        h2.section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Discover / Moods Section */
        .discover-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none; /* Firefox */
        }
        .discover-scroll::-webkit-scrollbar { display: none; } /* Chrome */

        .mood-card {
            min-width: 120px;
            height: 80px;
            border-radius: 12px;
            display: flex;
            align-items: flex-end;
            padding: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .mood-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
        }
        .mood-card span { position: relative; z-index: 2; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }

        /* Top 3 Results List */
        .results-list { display: flex; flex-direction: column; gap: 12px; margin-top: 25px;}

        .track-card {
            display: flex;
            align-items: center;
            background: var(--surface);
            padding: 10px;
            border-radius: 12px;
            gap: 15px;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .track-card:hover { border-color: var(--border); background: var(--surface-light); }

        .track-art { width: 55px; height: 55px; border-radius: 8px; object-fit: cover; }
        .track-info { flex: 1; overflow: hidden; }
        .track-title { margin: 0 0 4px 0; font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .track-artist { margin: 0; font-size: 13px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Sticky Bottom Player */
        .player {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--border);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        .player.active { transform: translateY(0); }

        .player-art { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .player-info { flex: 1; overflow: hidden; }
        .player-title { margin: 0 0 3px 0; font-size: 15px; font-weight: 600; }
        .player-artist { margin: 0; font-size: 12px; color: var(--primary); }

        .player-controls { display: flex; align-items: center; gap: 12px; }
        
        .control-btn {
            background: none; border: none; color: white; font-size: 20px; cursor: pointer; padding: 5px;
        }
        .play-btn {
            width: 45px; height: 45px; background: var(--primary); color: #000; border-radius: 50%; font-size: 18px; display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        /* Lyrics Button & Panel */
        .lyrics-btn {
            font-size: 22px; color: var(--text-muted); transition: color 0.3s;
        }
        .lyrics-btn.active { color: var(--primary); }

        .lyrics-panel {
            position: fixed;
            bottom: 80px; /* Sits right above the player */
            left: 5%;
            width: 90%;
            max-height: 60vh;
            background: rgba(20, 20, 20, 0.98);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            overflow-y: auto;
            transform: translateY(120%);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 999;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }
        .lyrics-panel.show { transform: translateY(0); opacity: 1; }
        
        .lyrics-text { font-size: 16px; line-height: 1.8; color: #ddd; white-space: pre-wrap; text-align: center; font-weight: 500;}
        .lyrics-loading { text-align: center; color: var(--primary); font-size: 14px; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .spinner { display: none; margin: 40px auto; border: 3px solid var(--border); border-top: 3px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="dev-credit">Crafted with ❤️ by <span>Abhik Dutta</span></div>

<div class="header">
    <h1>Music Pro</h1>
    <div class="search-bar">
        <input type="text" id="songInput" placeholder="Search songs, artists..." autocomplete="off">
        <button class="search-btn" onclick="triggerSearch()">Go</button>
    </div>
</div>

<div class="container">
    <h2 class="section-title">Discover Moods</h2>
    <div class="discover-scroll">
        <div class="mood-card" style="background-image: url('https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=300');" onclick="quickSearch('Bollywood Romance')">
            <span>Bollywood Romance</span>
        </div>
        <div class="mood-card" style="background-image: url('https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=300');" onclick="quickSearch('Global Top Hits')">
            <span>Top Hits</span>
        </div>
        <div class="mood-card" style="background-image: url('https://images.unsplash.com/photo-1518609878373-06d740f60d8b?w=300');" onclick="quickSearch('Lofi Chill Beats')">
            <span>Lofi Chill</span>
        </div>
        <div class="mood-card" style="background-image: url('https://images.unsplash.com/photo-1493225457124-a1a2a5ea3a0f?w=300');" onclick="quickSearch('Workout Mix')">
            <span>Workout</span>
        </div>
    </div>

    <div class="spinner" id="spinner"></div>

    <div id="resultsContainer" style="display: none;">
        <div class="results-list" id="resultsList">
            </div>
    </div>
</div>

<div class="lyrics-panel" id="lyricsPanel">
    <div class="lyrics-text" id="lyricsContent">Hit the lyrics button to sing along!</div>
</div>

<div class="player" id="bottomPlayer">
    <img src="" id="playerArt" class="player-art" alt="art">
    <div class="player-info">
        <p class="player-title" id="playerTitle">Select a track</p>
        <p class="player-artist" id="playerArtist">-</p>
    </div>
    <div class="player-controls">
        <button class="control-btn lyrics-btn" id="lyricsBtn" onclick="toggleLyrics()">📝</button>
        <button class="control-btn play-btn" id="playPauseBtn" onclick="togglePlay()">▶</button>
        <button class="control-btn" onclick="playNext()">⏭</button>
    </div>
    <audio id="mainAudio"></audio>
</div>

<script>
    let currentTracks = [];
    let currentIndex = 0;
    const audioEl = document.getElementById('mainAudio');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const lyricsPanel = document.getElementById('lyricsPanel');
    const lyricsBtn = document.getElementById('lyricsBtn');

    // 1. Enter Key Search
    document.getElementById('songInput').addEventListener("keypress", function(event) {
        if (event.key === "Enter") {
            event.preventDefault();
            this.blur();
            triggerSearch();
        }
    });

    // 2. Discover Quick Search
    function quickSearch(term) {
        document.getElementById('songInput').value = term;
        triggerSearch();
    }

    // 3. Search Fetching
    async function triggerSearch() {
        const query = document.getElementById('songInput').value.trim();
        if (!query) return;

        // Defaulting region to global for wider discovery, but you can change this
        const region = 'all'; 
        const quality = '320';
        
        document.getElementById('spinner').style.display = 'block';
        document.getElementById('resultsContainer').style.display = 'none';
        lyricsPanel.classList.remove('show'); // Hide lyrics on new search
        lyricsBtn.classList.remove('active');

        try {
            const response = await fetch(`https://my-song-brain.onrender.com/api/search?q=${encodeURIComponent(query)}&region=${region}&quality=${quality}`);
            const data = await response.json();

            document.getElementById('spinner').style.display = 'none';

            if (data.success && data.results.length > 0) {
                currentTracks = data.results; 
                renderResults(currentTracks);
                document.getElementById('resultsContainer').style.display = 'block';
            } else {
                alert("No close matches found.");
            }
        } catch (error) {
            document.getElementById('spinner').style.display = 'none';
            alert("Backend asleep or error. Wake up Render!");
        }
    }

    // 4. Render the List
    function renderResults(tracks) {
        const list = document.getElementById('resultsList');
        list.innerHTML = '';

        tracks.forEach((track, index) => {
            list.innerHTML += `
                <div class="track-card" onclick="loadTrack(${index})">
                    <img src="${track.cover_art}" class="track-art" alt="art">
                    <div class="track-info">
                        <p class="track-title">${track.title}</p>
                        <p class="track-artist">${track.artist}</p>
                    </div>
                </div>
            `;
        });
    }

    // 5. Load Track & Fetch Lyrics
    function loadTrack(index) {
        if(index >= currentTracks.length) index = 0; 
        currentIndex = index;
        const track = currentTracks[index];

        document.getElementById('bottomPlayer').classList.add('active');
        document.getElementById('playerArt').src = track.cover_art;
        document.getElementById('playerTitle').textContent = track.title;
        document.getElementById('playerArtist').textContent = track.artist;
        
        audioEl.src = track.url;
        audioEl.play();
        playPauseBtn.textContent = '⏸';

        // Auto-fetch lyrics in the background
        fetchLyrics(track.artist, track.title);
    }

    // 6. Lyrics API Integration (The Magic)
    async function fetchLyrics(artist, title) {
        const lyricsBox = document.getElementById('lyricsContent');
        lyricsBox.innerHTML = '<div class="lyrics-loading">Finding lyrics...</div>';
        
        // Clean up title (remove "Remix", text in brackets) for a better API match
        const cleanTitle = title.replace(/\\([^)]*\\)/g, '').split('-')[0].trim();
        const cleanArtist = artist.split(',')[0].trim(); // Just take the main artist

        try {
            const res = await fetch(`https://api.lyrics.ovh/v1/${cleanArtist}/${cleanTitle}`);
            const data = await res.json();
            
            if (data.lyrics) {
                // Remove the "Paroles de la chanson" header the API sometimes adds
                let cleanLyrics = data.lyrics.replace(/Paroles de la chanson .* par .*\r?\n/i, '');
                lyricsBox.textContent = cleanLyrics;
            } else {
                lyricsBox.innerHTML = `<i>No exact lyrics match found for <br>"${cleanTitle}"</i>`;
            }
        } catch(e) {
            lyricsBox.innerHTML = `<i>Lyrics unavailable right now.</i>`;
        }
    }

    function toggleLyrics() {
        lyricsPanel.classList.toggle('show');
        lyricsBtn.classList.toggle('active');
    }

    function togglePlay() {
        if (!audioEl.src) return;
        if (audioEl.paused) {
            audioEl.play();
            playPauseBtn.textContent = '⏸';
        } else {
            audioEl.pause();
            playPauseBtn.textContent = '▶';
        }
    }

    function playNext() {
        if(currentTracks.length === 0) return;
        loadTrack(currentIndex + 1);
    }

    audioEl.onended = playNext;
</script>

</body>
</html>
